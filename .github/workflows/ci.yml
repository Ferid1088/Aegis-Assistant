name: CI

on:
  push:
    branches: [main, phase_4_Evaluation_Observability]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/ -q --ignore=tests/integration

  trivy-scan:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - name: Build the app image
        run: docker build -t rag-appliance-app:ci .

      - name: Trivy scan (full report, all severities, non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          format: table
          output: trivy-report.txt
          exit-code: "0"

      - name: Upload full Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Trivy scan (CRITICAL only, blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
