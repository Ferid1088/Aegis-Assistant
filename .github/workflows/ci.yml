name: CI

on:
  push:
    branches: [main, phase_4_Evaluation_Observability]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/ -q --ignore=tests/integration

  eval-harness:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HF_HOME: ${{ github.workspace }}/.hf-cache
      # This runner has no GPU -- qwen2.5:7b generation via Ollama on CPU alone
      # can take well over the app's normal 60s default (rag/config.py's
      # llm_request_timeout_seconds), causing httpx.ReadTimeout on every LLM
      # call (query transform, table_ab, run_eval, etc.) in this job.
      LLM_REQUEST_TIMEOUT_SECONDS: "300"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-7b

      - name: Cache embedding/reranker models
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models-bge-m3-bge-reranker-v2-m3

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ && break
            sleep 2
          done

      - name: Pull the judge model
        run: ollama pull qwen2.5:7b

      - name: Prepare host directories and env file
        run: |
          mkdir -p data
          touch .env

      - name: Bring up Postgres and Redis (no app/worker/neo4j needed here)
        run: docker compose up -d postgres redis

      - name: "Seed golden Qdrant data (collection A: production ingestion)"
        run: uv run python run_ingest.py docs/TV_L.pdf

      - name: "Seed golden Qdrant data (collection B: table-aware variant)"
        run: uv run python eval/ingest_variant_b.py

      - name: "Table regression gate (hard gate: hit@10 == 1.0)"
        run: uv run python eval/table_ab.py --collection documents_tabstruct

      - name: Ragas eval (report only, no threshold)
        run: uv run python eval/run_eval.py

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results/

      - name: Tear down
        if: always()
        run: docker compose down -v

  trivy-scan:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker image prune -af
          df -h /

      - name: Build the app image
        run: docker build -t rag-appliance-app:ci .

      - name: Trivy scan (full report, all severities, non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          format: table
          output: trivy-report.txt
          exit-code: "0"

      - name: Upload full Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Trivy scan (CRITICAL only, blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
