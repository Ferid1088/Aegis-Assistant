name: CI

on:
  push:
    branches: [main, phase_4_Evaluation_Observability]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/ -q --ignore=tests/integration

  integration-tests:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # This job doesn't set up Ollama/vLLM (that stack is heavy and only the
      # eval/upload-and-chat job needs it) -- skip the LLM round-trip in
      # install.py's post-bootstrap healthcheck so it doesn't fail for a reason
      # unrelated to what this job actually verifies. Job-level (not just the
      # Bootstrap step below) because tests/integration/test_install_flow.py
      # also calls install.run_install() directly, in-process, during the pytest
      # step -- that call needs this too, or it hits the same real LLM round-trip.
      SKIP_LLM_HEALTHCHECK: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Bootstrap the real stack (secrets, docker compose up, migrations, first admin, healthcheck)
        run: uv run python install.py

      - name: Run Docker-backed integration tests
        run: uv run pytest tests/integration --ignore=tests/integration/test_upload_and_chat_flow.py -v -s

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  eval-harness:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      HF_HOME: ${{ github.workspace }}/.hf-cache
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-7b

      - name: Cache embedding/reranker models
        uses: actions/cache@v4
        with:
          path: ${{ env.HF_HOME }}
          key: hf-models-bge-m3-bge-reranker-v2-m3

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ && break
            sleep 2
          done

      - name: Pull the judge model
        run: ollama pull qwen2.5:7b

      - name: Bring up Postgres and Redis (no app/worker/neo4j needed here)
        run: docker compose up -d postgres redis

      - name: "Seed golden Qdrant data (collection A: production ingestion)"
        run: uv run python run_ingest.py docs/TV_L.pdf

      - name: "Seed golden Qdrant data (collection B: table-aware variant)"
        run: uv run python eval/ingest_variant_b.py

      - name: "Table regression gate (hard gate: hit@10 == 1.0)"
        run: uv run python eval/table_ab.py --collection documents_tabstruct

      - name: Ragas eval (report only, no threshold)
        run: uv run python eval/run_eval.py

      - name: Upload/chat round-trip (needs Ollama + Postgres + Redis, set up above)
        run: uv run pytest tests/integration/test_upload_and_chat_flow.py -v -s

      - name: Upload eval reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results/

      - name: Tear down
        if: always()
        run: docker compose down -v

  trivy-scan:
    needs: unit-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build the app image
        run: docker build -t rag-appliance-app:ci .

      - name: Trivy scan (full report, all severities, non-blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          format: table
          output: trivy-report.txt
          exit-code: "0"

      - name: Upload full Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

      - name: Trivy scan (CRITICAL only, blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rag-appliance-app:ci
          severity: CRITICAL
          exit-code: "1"
