services:
  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - ./data/neo4j:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appliance
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - ./data/redis:/data

  worker:
    build: .
    image: rag-appliance-worker:latest
    command: uv run celery -A rag.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

  app:
    build: .
    image: rag-appliance-app:latest
    command: uv run uvicorn rag.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - redis
      - postgres
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

  node_exporter:
    image: prom/node-exporter:latest
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    ports: ["9100:9100"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["9090:9090"]
    depends_on:
      - app
      - worker
      - node_exporter

  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      - postgres
      - redis

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: 8080
    ports: ["8080:8080"]
    depends_on:
      - glitchtip-migrate

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      - glitchtip-migrate

volumes:
  hf_models:
  prometheus_data:
