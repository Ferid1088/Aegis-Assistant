services:
  neo4j:
    image: neo4j:5-community
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - ./data/neo4j:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appliance
    ports: ["5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - ./data/redis:/data

  worker:
    build: .
    image: rag-appliance-worker:latest
    command: uv run celery -A rag.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

  app:
    build: .
    image: rag-appliance-app:latest
    command: uv run uvicorn rag.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - redis
      - postgres
    ports: ["8000:8000"]
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

volumes:
  hf_models:
