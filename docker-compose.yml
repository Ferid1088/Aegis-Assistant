services:
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_max__size: 512M
    volumes:
      - ./data/neo4j:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: appliance
    ports: ["127.0.0.1:5432:5432"]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["127.0.0.1:6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data

  worker:
    build: .
    image: rag-appliance-worker:latest
    command: uv run celery -A rag.worker.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      # rag/config.py's database_url defaults to a "localhost" hostname, reachable
      # only from the host -- this container reaches Postgres at the "postgres"
      # service hostname instead. Set here (environment: overrides env_file: for the
      # same key), not written into the shared .env file, so install.py's own
      # host-side Postgres access (which reads that same .env) is never broken by a
      # container-only hostname. ${POSTGRES_PASSWORD:-password} matches the
      # postgres service's own interpolation above (Phase 8.10b) -- both resolve
      # to the same real generated secret once install.py writes one into .env.
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/appliance
      # Same host-vs-container split as DATABASE_URL above: install.py writes a
      # host-reachable QDRANT_URL (http://localhost:6333, via qdrant's loopback
      # port) into the shared .env for its own host-side healthcheck/migration
      # steps; this container-internal hostname override takes precedence for
      # everything that actually runs inside app/worker.
      QDRANT_URL: http://qdrant:6333
      # `uv run` re-verifies/reconciles .venv against uv.lock on EVERY startup, not
      # just once at build time -- observed for real: every `docker compose
      # restart` re-triggers "Uninstalled N package(s)" / "Installed N package(s)"
      # writes into .venv. Under read_only: true there is no writable .venv to
      # reconcile into, so disable the sync step entirely -- deps are already fully
      # installed by `uv sync --frozen --no-dev` at image build time, so there is
      # nothing meaningful to reconcile at runtime anyway.
      UV_NO_SYNC: "1"
      # Even with UV_NO_SYNC=1 skipping the reconciliation itself, `uv run` still
      # tries to initialize its cache dir at $HOME/.cache/uv on every invocation and
      # crashes under read_only: true -- observed for real:
      #   error: Failed to initialize cache at `/home/appuser/.cache/uv`
      #     Caused by: failed to create directory `/home/appuser/.cache/uv`:
      #     Read-only file system (os error 30)
      # Point it at the /tmp tmpfs below instead of adding a separate tmpfs mount.
      UV_CACHE_DIR: /tmp/uv-cache
    read_only: true
    cap_drop: ["ALL"]
    tmpfs:
      - /tmp
    depends_on:
      - redis
      - postgres
      - qdrant
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

  app:
    build: .
    image: rag-appliance-app:latest
    command: uv run uvicorn rag.api.main:create_app --factory --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/appliance
      # Same host-vs-container split as DATABASE_URL above: install.py writes a
      # host-reachable QDRANT_URL (http://localhost:6333, via qdrant's loopback
      # port) into the shared .env for its own host-side healthcheck/migration
      # steps; this container-internal hostname override takes precedence for
      # everything that actually runs inside app/worker.
      QDRANT_URL: http://qdrant:6333
      # See worker's UV_NO_SYNC comment above -- same reconciliation-on-every-start
      # behavior was observed for `app` too.
      UV_NO_SYNC: "1"
      # Even with UV_NO_SYNC=1 skipping the reconciliation itself, `uv run` still
      # tries to initialize its cache dir at $HOME/.cache/uv on every invocation and
      # crashes under read_only: true -- observed for real:
      #   error: Failed to initialize cache at `/home/appuser/.cache/uv`
      #     Caused by: failed to create directory `/home/appuser/.cache/uv`:
      #     Read-only file system (os error 30)
      # Point it at the /tmp tmpfs below instead of adding a separate tmpfs mount.
      UV_CACHE_DIR: /tmp/uv-cache
    read_only: true
    cap_drop: ["ALL"]
    tmpfs:
      - /tmp
    depends_on:
      - redis
      - postgres
      - qdrant
    volumes:
      - ./data:/app/data
      - hf_models:/models/hf

  nginx:
    image: nginx:latest
    ports: ["80:80", "443:443"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

  node_exporter:
    image: prom/node-exporter:latest
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
    ports: ["127.0.0.1:9100:9100"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: ["127.0.0.1:9090:9090"]
    depends_on:
      - app
      - worker
      - node_exporter

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports: ["127.0.0.1:3000:3000"]
    depends_on:
      - prometheus

  glitchtip-migrate:
    image: glitchtip/glitchtip:latest
    command: ./manage.py migrate
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      - postgres
      - redis

  glitchtip-web:
    image: glitchtip/glitchtip:latest
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
      PORT: 8080
    ports: ["127.0.0.1:8080:8080"]
    depends_on:
      - glitchtip-migrate

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY}
    depends_on:
      - glitchtip-migrate

volumes:
  hf_models:
  prometheus_data:
  grafana_data:
